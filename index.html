<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rečolov - 021</title>
<style>
    body { 
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
        text-align: center; 
        background: #121213; 
        color: white; 
        margin: 0;
        padding-top: 30px;
    }
    h1 { margin-bottom: 5px; letter-spacing: 2px; }
    .brand { font-weight: bold; color: #538d4e; font-size: 1.2rem; margin-bottom: 20px; letter-spacing: 1px; }
    #board { display: grid; grid-template-rows: repeat(6, 1fr); gap: 5px; width: 300px; margin: 0 auto 20px auto; }
    .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
    .tile { border: 2px solid #3a3a3c; height: 55px; width: 55px; line-height: 55px; font-size: 28px; font-weight: bold; text-transform: uppercase; user-select: none; }
    .correct { background: #538d4e; border-color: #538d4e; }
    .present { background: #b59f3b; border-color: #b59f3b; }
    .absent { background: #3a3a3c; border-color: #3a3a3c; }
    .controls { margin-top: 20px; }
    input { padding: 12px; font-size: 18px; text-transform: uppercase; border: 2px solid #3a3a3c; border-radius: 4px; width: 160px; outline: none; background: #121213; color: white; text-align: center; }
    input:focus { border-color: #538d4e; }
    button { padding: 12px 25px; font-size: 18px; cursor: pointer; background: #538d4e; color: white; border: none; border-radius: 4px; font-weight: bold; margin-left: 5px; }
    button:hover { background: #6aaa64; }
</style>
</head>
<body>

    <h1>REČOLOV</h1>
    <div class="brand">021</div>
    <div id="board"></div>
    <div class="controls">
        <input id="guessInput" maxlength="5" placeholder="REČ" autofocus>
        <button id="submitBtn">OK</button>
    </div>

<script>
// OVDE IDE TVOJ JAVASCRIPT KOD KOJI SI MI POSLAO
let WORDS = [];
let WORD_SET = new Set();
let secret = "";
let currentRow = 0;
let gameOver = false;

function seededShuffle(array, seed) {
    let m = array.length, t, i;
    while (m) {
        i = Math.floor(Math.abs(Math.sin(seed++)) * m--);
        t = array[m];
        array[m] = array[i];
        array[i] = t;
    }
    return array;
}

async function loadWords() {
    try {
        const response = await fetch('reci.txt');
        const text = await response.text();
        WORDS = text.split(/\r?\n/)
                    .map(w => w.trim().toUpperCase())
                    .filter(w => w.length === 5);
        WORD_SET = new Set(WORDS);
        if (WORDS.length === 0) {
            alert("Greška: Fajl reci.txt je prazan ili nema reči od 5 slova.");
            return;
        }
        const shuffled = seededShuffle([...WORDS], 12345);
        const start = new Date(2024, 0, 1);
        const today = new Date();
        const diff = Math.floor((today - start) / (1000 * 60 * 60 * 24));
        secret = shuffled[diff % shuffled.length];
        createBoard();
    } catch (err) {
        console.error("Ne mogu da učitam reci.txt", err);
        alert("Greška pri učitavanju reči.");
    }
}

function createBoard() {
    const board = document.getElementById("board");
    board.innerHTML = "";
    for (let i = 0; i < 6; i++) {
        const row = document.createElement("div");
        row.className = "row";
        for (let j = 0; j < 5; j++) {
            const tile = document.createElement("div");
            tile.className = "tile";
            row.appendChild(tile);
        }
        board.appendChild(row);
    }
}

function evaluateGuess(guess, secret) {
    let result = Array(5).fill("absent");
    let secretArr = secret.split("");
    let guessArr = guess.split("");
    for (let i = 0; i < 5; i++) {
        if (guessArr[i] === secretArr[i]) {
            result[i] = "correct";
            secretArr[i] = null;
            guessArr[i] = null;
        }
    }
    for (let i = 0; i < 5; i++) {
        if (guessArr[i] !== null) {
            let index = secretArr.indexOf(guessArr[i]);
            if (index !== -1) {
                result[i] = "present";
                secretArr[index] = null;
            }
        }
    }
    return result;
}

function submitGuess() {
    if (gameOver) return;
    const input = document.getElementById("guessInput");
    const guess = input.value.toUpperCase().trim();
    if (guess.length !== 5) {
        alert("Reč mora imati 5 slova!");
        return;
    }
    if (!WORD_SET.has(guess)) {
        alert("Reč nije u bazi!");
        return;
    }
    const board = document.getElementById("board");
    const tiles = board.children[currentRow].children;
    const result = evaluateGuess(guess, secret);
    for (let i = 0; i < 5; i++) {
        tiles[i].textContent = guess[i];
        tiles[i].classList.add(result[i]);
    }
    if (guess === secret) {
        gameOver = true;
        input.disabled = true;
        setTimeout(() => alert("Čestitamo!"), 200);
        return;
    }
    currentRow++;
    input.value = "";
    if (currentRow === 6) {
        gameOver = true;
        input.disabled = true;
        setTimeout(() => alert("Kraj! Rešenje je: " + secret), 200);
    }
}

loadWords();
document.getElementById("submitBtn").addEventListener("click", submitGuess);
document.getElementById("guessInput").addEventListener("keypress", (e) => {
    if (e.key === "Enter") submitGuess();
});
</script>

</body>
</html>

document.getElementById("submitBtn").addEventListener("click", submitGuess);
document.getElementById("guessInput").addEventListener("keypress", (e) => {
    if (e.key === "Enter") submitGuess();
});
