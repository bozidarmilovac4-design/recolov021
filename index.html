<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Rečolov - 021</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121213; color: white; padding-top: 30px; }
        #board { display: grid; grid-template-rows: repeat(6, 1fr); gap: 5px; width: 300px; margin: 0 auto 20px auto; }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .tile { border: 2px solid #3a3a3c; height: 55px; width: 55px; line-height: 55px; font-size: 28px; font-weight: bold; text-transform: uppercase; }
        .correct { background: #538d4e; border-color: #538d4e; }
        .present { background: #b59f3b; border-color: #b59f3b; }
        .absent { background: #3a3a3c; border-color: #3a3a3c; }
        input { padding: 12px; font-size: 18px; text-transform: uppercase; background: #121213; color: white; border: 2px solid #3a3a3c; }
        button { padding: 12px; font-size: 18px; background: #538d4e; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>REČOLOV</h1>
    <div id="board"></div>
    <input id="guessInput" maxlength="5" placeholder="REČ">
    <button id="submitBtn">OK</button>

    <script>
        let WORDS = [];
        let WORD_SET = new Set();
        let secret = "";
        let currentRow = 0;
        let gameOver = false;

        function seededShuffle(array, seed) {
            let m = array.length, t, i;
            while (m) {
                i = Math.floor(Math.abs(Math.sin(seed++)) * m--);
                t = array[m]; array[m] = array[i]; array[i] = t;
            }
            return array;
        }

        async function loadWords() {
            try {
                const response = await fetch('reci.txt');
                const text = await response.text();
                WORDS = text.split(/\r?\n/).map(w => w.trim().toUpperCase()).filter(w => w.length === 5);
                WORD_SET = new Set(WORDS);
                const shuffled = seededShuffle([...WORDS], 12345);
                const diff = Math.floor((new Date() - new Date(2024, 0, 1)) / 86400000);
                secret = shuffled[diff % shuffled.length];
                createBoard();
            } catch (err) { alert("Greška: Proveri da li je reci.txt u istom folderu!"); }
        }

        function createBoard() {
            const board = document.getElementById("board");
            for (let i = 0; i < 6; i++) {
                const row = document.createElement("div");
                row.className = "row";
                for (let j = 0; j < 5; j++) {
                    const tile = document.createElement("div");
                    tile.className = "tile";
                    row.appendChild(tile);
                }
                board.appendChild(row);
            }
        }

        function submitGuess() {
            if (gameOver) return;
            const input = document.getElementById("guessInput");
            const guess = input.value.toUpperCase().trim();
            if (guess.length !== 5 || !WORD_SET.has(guess)) { alert("Reč mora imati 5 slova i biti u bazi!"); return; }
            
            const tiles = document.getElementById("board").children[currentRow].children;
            const secretArr = secret.split("");
            const result = Array(5).fill("absent");

            for (let i = 0; i < 5; i++) {
                if (guess[i] === secret[i]) { result[i] = "correct"; secretArr[i] = null; }
            }
            for (let i = 0; i < 5; i++) {
                if (result[i] !== "correct" && secretArr.includes(guess[i])) {
                    result[i] = "present";
                    secretArr[secretArr.indexOf(guess[i])] = null;
                }
            }

            for (let i = 0; i < 5; i++) {
                tiles[i].textContent = guess[i];
                tiles[i].classList.add(result[i]);
            }

            if (guess === secret) { alert("Pobeda!"); gameOver = true; }
            else if (++currentRow === 6) { alert("Kraj! Rešenje: " + secret); gameOver = true; }
            input.value = "";
        }

        loadWords();
        document.getElementById("submitBtn").onclick = submitGuess;
    </script>
</body>
</html>
